services:
  backend:
    image: care_local
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        ADDITIONAL_PLUGS: ${ADDITIONAL_PLUGS:-}
    env_file:
      - ./docker/.local.env
    volumes:
      - .:/app
      - ../care_odoo_be:/opt/care_odoo_be
    entrypoint: ["bash", "scripts/start-dev.sh"]
    ports:
      - "9000:9000"
      - "9876:9876" #debugpy
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      celery:
        condition: service_healthy

  celery:
    image: care_local
    env_file:
      - ./docker/.local.env
    entrypoint: ["bash", "scripts/celery-dev.sh"]
    restart: unless-stopped
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - ../care_odoo_be:/opt/care_odoo_be

  # ============================================================================
  # Odoo ERP Integration (optional)
  # ============================================================================
  # Care syncs invoices, payments, patients, and inventory to Odoo via REST API.
  # The odoo_connector modules (mounted below) add custom API endpoints to Odoo.
  # Disable by commenting out this section or pointing CARE_ODOO_HOST elsewhere.
  odoo:
    image: odoo:19.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
      PORT: 5432
    volumes:
      - odoo-data:/var/lib/odoo
      - ../odoo_connector:/mnt/extra-addons

  # ============================================================================
  # Metabase Analytics (optional)
  # ============================================================================
  # Connects to Care's PostgreSQL for BI dashboards and ad-hoc analytics.
  # Query library available in care_analytics_sql/.
  # Access at http://localhost:3000 after initial setup.
  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: care
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
      MB_ENCRYPTION_SECRET_KEY: care-local-dev-secret-key-change-in-production

volumes:
  odoo-data:
