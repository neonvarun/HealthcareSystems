name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set minimal permissions needed for the setup steps
    permissions:
      contents: read # for actions/checkout

    # Set a timeout to prevent infinite runs
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          # Fetch full history for potential rollback operations
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --ignore-scripts
        timeout-minutes: 5

      - name: Run Postinstall Scripts
        run: npm run postinstall
        timeout-minutes: 3

      - name: Setup Care Apps
        run: npm run setup
        timeout-minutes: 2

      - name: Display Setup Summary
        run: |
          echo "Copilot setup completed successfully!"
          echo ""
          echo "📦 Dependencies installed and cached"
          echo "🔧 Configuration files generated"
          echo "🚀 Development server tested"
          echo ""
          echo "Environment is ready for the Copilot coding agent."
