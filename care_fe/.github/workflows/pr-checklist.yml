name: PR Checklist Validator

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited

permissions:
  issues: write
  pull-requests: write

jobs:
  checklist:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Validate Checklist
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;

            if (context.payload.pull_request.user.type === 'Bot') {
              return;
            }

            const response = await fetch(`https://raw.githubusercontent.com/ohcnetwork/leaderboard-data/main/contributors/${prAuthor}.md`);
            if (response.ok) {
              const userData = await response.text();
              if (userData.includes('role: core')) return;
            }

            const prBody = context.payload.pull_request.body || '';

            const checklist = [
              'Add specs that demonstrate the bug or test the new feature.',
              'Update \\[product documentation\\]\\(https://docs\\.ohc\\.network\\)\\.',
              'Ensure that UI text is placed in I18n files.',
              'Prepare a screenshot or demo video for the changelog entry and attach it to the issue.',
              'Request peer reviews.',
              'Complete QA on mobile devices.',
              'Complete QA on desktop devices.'
            ];

            const checked = checklist.filter(item => {
              const pattern = new RegExp(`-\\s*\\[\\s*[xX]\\s*\\]\\s*${item}`, 'i');
              return pattern.test(prBody);
            });

            if (checked.length > 0) {
              return;
            }

            const timelineQuery = `
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    timelineItems(last: 1, itemTypes: [REOPENED_EVENT]) {
                      edges {
                        node {
                          ... on ReopenedEvent {
                            createdAt
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const timelineResult = await github.graphql(timelineQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              prNumber: context.payload.pull_request.number
            });

            const lastReopenTime = timelineResult.repository.pullRequest.timelineItems.edges[0]?.node?.createdAt;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const existingComment = comments.data.find(comment => {
              if (comment.user.type !== 'Bot' || !comment.body.includes('⚠️ Merge Checklist Incomplete')) {
                return false;
              }
              return !lastReopenTime || new Date(comment.created_at) > new Date(lastReopenTime);
            });

            if (existingComment) {
              return;
            }

            const commentBody = [
              '## ⚠️ Merge Checklist Incomplete',
              '',
              'Thank you for your contribution! To help us review your PR efficiently, please complete the merge checklist in your PR description.',
              '',
              '**Your PR will be reviewed once you have marked the appropriate checklist items.**',
              '',
              'To update the checklist:',
              '- Change `- [ ]` to `- [x]` for completed items',
              '- Only check items that are relevant to your PR',
              '- Leave items unchecked if they don\'t apply',
              '',
              'The checklist helps ensure code quality, testing coverage, and documentation are properly addressed.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: commentBody
            });
